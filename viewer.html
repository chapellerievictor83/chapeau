<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer GLB</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: Arial, sans-serif;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 12px;
      border-radius: 12px;
      max-width: 360px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div><strong>Viewer GLB</strong></div>
    <div id="status">Chargement...</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.164.1/examples/jsm/loaders/GLTFLoader.js';

    const MODEL_URL = "https://oqsvqgkhkbhobohatrux.supabase.co/storage/v1/object/public/hats/test.glb";

    const canvas = document.getElementById('canvas');
    const statusEl = document.getElementById('status');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.01,
      100
    );
    camera.position.set(0, 0.2, 2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 2.2);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.2);
    dir1.position.set(2, 2, 2);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir2.position.set(-2, 1, -1);
    scene.add(dir2);

    const grid = new THREE.GridHelper(4, 20, 0x666666, 0x333333);
    grid.position.y = -0.5;
    scene.add(grid);

    const axes = new THREE.AxesHelper(0.5);
    scene.add(axes);

    const loader = new GLTFLoader();

    loader.load(
      MODEL_URL,
      (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 1 / maxDim;
        model.scale.setScalar(scale);

        statusEl.textContent = 'Modèle chargé';
      },
      (event) => {
        if (event.total) {
          const percent = Math.round((event.loaded / event.total) * 100);
          statusEl.textContent = `Chargement ${percent}%`;
        } else {
          statusEl.textContent = 'Chargement...';
        }
      },
      (error) => {
        console.error(error);
        statusEl.textContent = 'Erreur chargement GLB';
      }
    );

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
